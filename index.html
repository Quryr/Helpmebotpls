ароны с курицей",budget:"120-190 ₽",ingredients:["Макароны 100-120 г","Курица 180-220 г","Соль","Паприка по желанию"],steps:["Нарежь курицу кусочками, обжарь 8 минут до готовности.","Отвари макароны.","Смешай макароны и курицу, прогрей 1-2 минуты."]},pastaCheese:{title:"Макароны с сыром",budget:"90-160 ₽",ingredients:["Макароны 100-120 г","Сыр 60-90 г","Немного сливочного масла"],steps:["Отвари макароны.","Добавь масло и тертый сыр в горячие макароны.","Перемешай до тягучей текстуры."]},kefirBanana:{title:"Кефир и банан перед сном",budget:"50-90 ₽",ingredients:["Кефир 0.5 л","1 банан"],steps:["Выпей кефир за 40-60 минут до сна.","Банан добавь, если остался голод."]},buckwheatChicken:{title:"Гречка с курицей",budget:"110-180 ₽",ingredients:["Гречка 100-120 г","Курица 180-220 г","Лук","Соль, перец"],steps:["Гречку промой и отвари 15-18 минут.","Курицу нарежь и обжарь 8-10 минут.","Добавь лук, жарь еще 2 минуты и смешай с гречкой."]},potatoStew:{title:"Картошка с тушенкой",budget:"120-190 ₽",ingredients:["Картофель 4-5 шт","Тушенка 1/2-1 банка","Лук","Соль"],steps:["Картошку нарежь кубиком и отвари 12-15 минут до мягкости.","На сковороде прогрей тушенку с луком 4-5 минут.","Смешай с картошкой и прогрей 2 минуты."]},riceEggChicken:{title:"Рис с курицей и яйцом",budget:"120-200 ₽",ingredients:["Рис 100-120 г","Курица 150-200 г","2 яйца","Соль"],steps:["Рис отвари 12-15 минут.","Курицу обжарь до готовности 8-10 минут.","Добавь яйца, размешай и смешай с рисом."]},oatmealMass:{title:"Овсянка с бананом и арахисом",budget:"55-90 ₽",ingredients:["Овсянка 70-90 г","Молоко или вода","1 банан","Арахис 20-30 г"],steps:["Залей овсянку молоком или водой и вари 4-6 минут.","Добавь нарезанный банан и арахис.","Хороший плотный завтрак без сложной готовки."]},curdBanana:{title:"Творог с бананом",budget:"85-130 ₽",ingredients:["Творог 180-200 г","1 банан"],steps:["В миску выложи творог.","Нарежь банан кружками и смешай.","Если сухо, добавь 1-2 ложки кефира."]},overnightOats:{title:"Овсянка на ночь в контейнере",budget:"55-95 ₽",ingredients:["Овсянка 70-90 г","Молоко 200-250 мл","Банан","Арахис 20 г"],steps:["С вечера засыпь овсянку в контейнер и залей молоком.","Добавь нарезанный банан и арахис, закрой крышкой.","Утром просто достань из холодильника и ешь без готовки."]},peanutSandwiches:{title:"Сэндвичи с арахисовой пастой и бананом",budget:"70-130 ₽",ingredients:["Хлеб 4 ломтика","Арахисовая паста","1 банан"],steps:["Намажь пасту на хлеб.","Добавь кружки банана и закрой сэндвич.","Убери в контейнер: удобно взять в дорогу и на перерыв."]},eggsBreadCheese:{title:"Яйца, хлеб и сыр",budget:"75-120 ₽",ingredients:["3 яйца","Хлеб","Сыр 30-40 г","Соль"],steps:["Свари яйца заранее на 2 дня вперед (8-9 минут).","Утром только собери в контейнер яйца, хлеб и сыр.","Можно есть без разогрева, удобно в универе."]},omeletCheese:{title:"Омлет с сыром и хлебом",budget:"80-130 ₽",ingredients:["3 яйца","Сыр 40-50 г","Хлеб 2 ломтика","Соль"],steps:["Взбей яйца с щепоткой соли.","Вылей на разогретую сковороду, добавь сыр и накрой крышкой на 4-5 минут.","Подавай с хлебом. Готово быстро и сытно."]},friedPotatoEgg:{title:"Жареная картошка с яйцами",budget:"90-150 ₽",ingredients:["Картофель 3-4 шт","2 яйца","Масло","Соль"],steps:["Нарежь картошку тонко и обжарь 10-12 минут до мягкости.","Добавь яйца, перемешай и жарь еще 2-3 минуты.","Простое калорийное блюдо на набор."]},riceMince:{title:"Рис с фаршем",budget:"120-190 ₽",ingredients:["Рис 100-120 г","Фарш 180-220 г","Лук","Соль, перец"],steps:["Отвари рис 12-15 минут.","Фарш с луком обжарь 8-10 минут.","Смешай рис с фаршем и прогрей 2 минуты."]},buckwheatMince:{title:"Гречка с фаршем",budget:"120-190 ₽",ingredients:["Гречка 100-120 г","Фарш 180-220 г","Лук","Соль"],steps:["Гречку отвари 15-18 минут.","Фарш обжарь с луком 8-10 минут.","Смешай, посоли, прогрей 2 минуты."]},pastaStew:{title:"Макароны с тушенкой",budget:"100-170 ₽",ingredients:["Макароны 100-120 г","Тушенка 1/2 банки","Соль"],steps:["Отвари макароны до гото
