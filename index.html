        function nowInTz() {
          return new Date(new Date().toLocaleString("en-US", { timeZone: TZ }));

        function formatDate(date) {

        }

        function tzTime(date) {
          return new Intl.DateTimeFormat("ru-RU", {
            timeZone: TZ,
            hour: "2-digit",
            minute: "2-digit",
            hourCycle: "h23",
          }).format(date);
        }

        function timeToMinutes(value) {
          const [h, m] = value.split(":").map(Number);
          return h * 60 + m;
        }

        function minutesToTime(value) {
          const normalized = ((value % 1440) + 1440) % 1440;
          const h = Math.floor(normalized / 60);
          const m = normalized % 60;
          return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }

        function addMinutes(time, amount) {
          return minutesToTime(timeToMinutes(time) + amount);
        }

        function subtractMinutes(time, amount) {
          return minutesToTime(timeToMinutes(time) - amount);
        }

        function toWeekStart(date) {
          const local = new Date(date);
          const day = (local.getDay() + 6) % 7;
          local.setHours(0, 0, 0, 0);
          local.setDate(local.getDate() - day);
          return local;
        }

        function getWeekKey(date = nowInTz()) {
          const local = toWeekStart(date);
          return `${local.getFullYear()}-${String(local.getMonth() + 1).padStart(2, "0")}-${String(local.getDate()).padStart(2, "0")}`;
        }

        function weekDateFromKey(key) {
          const [y, m, d] = key.split("-").map(Number);
          return new Date(y, m - 1, d, 0, 0, 0, 0);
        }

        function sundayLockPassed(weekKey, now = nowInTz()) {
          const weekStart = weekDateFromKey(weekKey);
          const lockPoint = new Date(weekStart);
          lockPoint.setDate(lockPoint.getDate() + 6);
          lockPoint.setHours(23, 59, 0, 0);
          return now >= lockPoint;
        }

        function chelyabinskWeekday(date = nowInTz()) {
          return (date.getDay() + 6) % 7;
        }

        function getAutoWeekType(now, anchorDate) {
          const anchor = new Date(anchorDate);
          const currentWeekStart = toWeekStart(now);
          const anchorWeekStart = toWeekStart(anchor);
          const diffMs = currentWeekStart.getTime() - anchorWeekStart.getTime();
          const weekShift = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
          return Math.abs(weekShift) % 2 === 0 ? "week1" : "week2";
        }

        function getRotatedRecipe(source, index) {
          return source[((index % source.length) + source.length) % source.length];
        }

        function toggleWeekType(weekType) {
          return weekType === "week1" ? "week2" : "week1";
        }

        function getNextDayFirstClassTime(schedule, mode, day, weekType) {
          for (let shift = 1; shift <= 7; shift += 1) {
            const dayIndex = (day + shift) % 7;
            const weekShift = Math.floor((day + shift) / 7);
            const weekByShift = weekShift % 2 === 0 ? weekType : toggleWeekType(weekType);
            const entries = schedule
              .filter((item) => {
                if (item.mode !== mode || item.day !== dayIndex) return false;
                if (mode === "school") return true;
                return item.weekType === weekByShift;
              })
              .sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));

            if (entries.length > 0) {
              return entries[0].start;
            }
          }
          return null;
        }

          if (!nextClassStart) return "23:30";

          const wakeMinutes = timeToMinutes(nextClassStart) - prepLeadMinutes;
          let sleepMinutes = wakeMinutes - 8 * 60;

          if (sleepMinutes < 20 * 60) sleepMinutes += 1440;
          sleepMinutes = Math.max(21 * 60, Math.min(24 * 60 + 30, sleepMinutes));
          return minutesToTime(sleepMinutes);
        }

        function buildMealPlan(dayLessons, day, weekType, bedtime, prepLeadMinutes) {
          const sorted = dayLessons.slice().sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
          const firstClass = sorted[0]?.start;
          const wakeBySchedule = firstClass ? subtractMinutes(firstClass, prepLeadMinutes) : null;
          const breakfastRecipe = getRotatedRecipe(BREAKFAST_RECIPES, day + (weekType === "week2" ? 2 : 0));
          const breakfastTime = firstClass

              recipeKey: breakfastRecipe,
            },
          ];

          let snackIndex = 0;
          for (let i = 0; i < sorted.length - 1; i += 1) {
            const current = sorted[i];
            const next = sorted[i + 1];
            const gap = timeToMinutes(next.start) - timeToMinutes(current.end);
            if (gap >= 30) {
              const snackKey = getRotatedRecipe(BREAK_SNACK_RECIPES, snackIndex + day);
              snackIndex += 1;
              plan.push({
                id: crypto.randomUUID(),
                time: addMinutes(current.end, 10),

            }

            const defaultSnack = getRotatedRecipe(BREAK_SNACK_RECIPES, day + 3);
            plan.push({
              id: crypto.randomUUID(),
              time: firstClass ? addMinutes(firstClass, 170) : "11:30",
              title: RECIPE_BOOK[defaultSnack].title,
              note: "Дополнительный калорийный прием в середине дня",
              recipeKey: defaultSnack,
            });
          }

          const mainRecipe = getRotatedRecipe(weekType === "week1" ? MAIN_RECIPES_WEEK1 : MAIN_RECIPES_WEEK2, day + sorted.length);
          const lastEnd = sorted[sorted.length - 1]?.end ?? "17:30";
          plan.push({
            id: crypto.randomUUID(),
            time: firstClass ? addMinutes(lastEnd, 85) : "18:30",
            title: RECIPE_BOOK[mainRecipe].title,
            note: "Основной домашний прием пищи на набор массы",

          });

          const lateMealTime = minutesToTime(clampMinutes(timeToMinutes(subtractMinutes(bedtime, 75)), timeToMinutes("20:20"), timeToMinutes("23:30")));
          const lateRecipe = getRotatedRecipe(LATE_RECIPES, day + (weekType === "week2" ? 1 : 0));
          plan.push({
            id: crypto.randomUUID(),
            time: lateMealTime,
            title: RECIPE_BOOK[lateRecipe].title,
            note: "Спокойный прием перед сном для добора калорий",
            recipeKey: lateRecipe,

          if (!firstClass) {
            const homeLunch = getRotatedRecipe(MAIN_RECIPES_WEEK1, day + 4);
            const homeSnack = getRotatedRecipe(BREAK_SNACK_RECIPES, day + 2);

                note: "Перекус между делами",

          useEffect(() => {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;

            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            if (!user?.id) return;

            const name = [user.first_name, user.last_name].filter(Boolean).join(" ") || user.username || `ID ${user.id}`;
            setIdentity({
              docId: `tg-${user.id}`,
              displayName: name,
              telegramUsername: user.username ? `@${user.username}` : `id:${user.id}`,
              telegramId: String(user.id),
              source: "telegram",
            });
          }, []);

          useEffect(() => {
            const bootstrap = async () => {
              setLoaded(false);
              const localRaw = localStorage.getItem("focus-vault-local-data");
              let localState = createDefaultState();

              try {
                localState = hydrateState(localRaw ? JSON.parse(localRaw) : createDefaultState());
              } catch {
                localState = createDefaultState();
              }

              if (!db) {
                setData({
                  ...localState,
                  profile: {
                    telegramId: identity.telegramId,
                    telegramUsername: identity.telegramUsername,
                    displayName: identity.displayName,
                  },
                });
                setSyncLabel("Local mode");
                setLoaded(true);
                return;
              }

              try {
                setSyncLabel("Firebase sync...");
                const ref = doc(db, "focusVault", identity.docId);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                  const remote = hydrateState(snap.data().state);
                  setData({
                    ...remote,
                    profile: {
                      telegramId: identity.telegramId,
                      telegramUsername: identity.telegramUsername,
                      displayName: identity.displayName,
                    },
                  });
                } else {
                  const fresh = {
                    ...localState,
                    profile: {
                      telegramId: identity.telegramId,
                      telegramUsername: identity.telegramUsername,
                      displayName: identity.displayName,
                    },
                  };
                  await setDoc(ref, { state: fresh, updatedAt: Date.now() });
                  setData(fresh);
                }
                setSyncLabel("Firebase online");
              } catch {
                setData(localState);
                setSyncLabel("Firebase error -> local backup");
              } finally {
                setLoaded(true);
              }
            };

            void bootstrap();
          }, [identity.docId, identity.displayName, identity.telegramId, identity.telegramUsername]);

          useEffect(() => {
            if (!loaded) return;
            localStorage.setItem("focus-vault-local-data", JSON.stringify(data));
            if (!db) return;
            void setDoc(doc(db, "focusVault", identity.docId), { state: data, updatedAt: Date.now() }, { merge: true });
          }, [data, loaded, identity.docId]);

          useEffect(() => {
            if (!alarmTriggered) return;
            if (navigator.vibrate) navigator.vibrate([300, 120, 300, 120, 300]);
            const loop = setInterval(() => {
              if (navigator.vibrate) navigator.vibrate([260, 80, 260]);
            }, 4500);
            return () => clearInterval(loop);
          }, [alarmTriggered]);

          useEffect(() => {
            if (!data.alarm.autoFromSchedule || !nextClassInfo) return;

            setData((prev) => {
              if (!prev.alarm.autoFromSchedule || prev.alarm.time === wakeTime) return prev;

          const sendTelegramAlarm = async (kind) => {
            const chatId = identity.telegramId;
            if (!chatId) {
              setBotStatus("Telegram user не определен. Открой приложение в Telegram WebApp.");
              return false;
            }

            if (!TELEGRAM_BOT_TOKEN) {
              setBotStatus("Не задан TELEGRAM_BOT_TOKEN в коде.");
              return false;
            }

            const textLines = kind === "test"
              ? [
                  "[TEST] Будильник подключен.",
                  `Профиль: ${identity.telegramUsername || `id:${chatId}`}`,
                  `Время (Челябинск): ${currentTime}`,
                ]
              : [
                  "Подъем. Время вставать.",
                  `Будильник: ${data.alarm.time}`,
                  nextClassInfo ? `Ближайшее занятие: ${DAYS_FULL[nextClassInfo.dayIndex]} ${nextClassInfo.start}` : "",
                ].filter(Boolean);

            try {
              setBotStatus(kind === "test" ? "Отправляю тест в Telegram..." : "Отправляю сигнал будильника...");
              const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  chat_id: chatId,
                  text: textLines.join("\n"),
                  disable_web_page_preview: true,
                }),
              });

              const payload = await response.json();
              if (!response.ok || !payload?.ok) {
                setBotStatus("Ошибка Telegram API. Проверь токен, доступ и чат с ботом.");
                return false;
              }

              setBotStatus(kind === "test" ? "Тест отправлен в Telegram." : "Сигнал будильника отправлен в Telegram.");
              return true;
            } catch {
              setBotStatus("Не удалось отправить запрос к Telegram API.");
              return false;

              const tasks = prev.tasks.map((entry) => {

                const order = ["todo", "doing", "done"];

                if (entry.status !== "done" && nextStatus === "done") reward = REWARDS.taskDone;
                return { ...entry, status: nextStatus };
              });

              return {

                            <option value="lesson">Урок</option>
                          </select>
                          <button className="primary-btn" onClick={addScheduleRow}>Добавить</button>
                        </div>
                      )}

                      <p className="mt-4 text-sm text-slate-300">Риск прогулов (активная неделя): <span className="font-bold">{weekSkipped} / {data.study.absenceLimit}</span></p>
                      <div className="progress-line mt-2">
                        <motion.div className={`h-full ${attendancePercent < 60 ? "bg-emerald-500" : attendancePercent < 85 ? "bg-yellow-500" : "bg-red-500"}`} animate={{ width: `${attendancePercent}%` }} />
                      </div>
                    </motion.section>
                  )}

                  {tab === "planner" && (
                    <motion.section key="planner" className="feature-surface" initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -6 }}>
                      <h2 className="feature-title">Дела</h2>
                      <p className="feature-text">Понятный список задач и блоки времени на день.</p>

                      <div className="mt-4 flex flex-wrap gap-2">
                        <input className="field min-w-[220px] flex-1" value={newTask} onChange={(e) => setNewTask(e.target.value)} placeholder="Новая задача" />
                        <select className="field w-[160px]" value={newTaskType} onChange={(e) => setNewTaskType(e.target.value)}>
                          <option value="homework">ДЗ</option>
                          <option value="freelance">Фриланс</option>
                          <option value="plan">План</option>
                        </select>
                        <button className="primary-btn" onClick={addTask}>Добавить</button>
                      </div>

                      <div className="mt-5 grid gap-4 md:grid-cols-3">
                        {[
                          ["todo", "Запланировано"],
                          ["doing", "В процессе"],
                          ["done", "Сделано"],
                        ].map(([status, label]) => (
                          <div key={status} className="column-shell">
                            <p className="column-title">{label}</p>
                            <div className="mt-2 space-y-2">
                              {currentTasks.filter((task) => task.status === status).map((task) => (
                                <button
                                  key={task.id}
                                  disabled={task.locked}
                                  className="task-chip"
                                  onClick={() => cycleTaskStatus(task.id)}
                                >
                                  {task.title}
                                </button>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>

                      <div className="mt-8">
                        <p className="label">План по времени</p>
                        <div className="mt-2 flex flex-wrap gap-2">
                          <input className="field md:w-[210px]" value={timelineDraft.title} onChange={(e) => setTimelineDraft((prev) => ({ ...prev, title: e.target.value }))} placeholder="Блок времени" />
                          <select className="field w-[150px]" value={timelineDraft.type} onChange={(e) => setTimelineDraft((prev) => ({ ...prev, type: e.target.value }))}>
                            <option value="homework">ДЗ</option>
                            <option value="freelance">Фриланс</option>
                            <option value="rest">Отдых</option>
                          </select>
                          <input className="field w-[100px]" type="number" min={8} max={23} value={timelineDraft.start} onChange={(e) => setTimelineDraft((prev) => ({ ...prev, start: Number(e.target.value) || 8 }))} />
                          <input className="field w-[100px]" type="number" min={9} max={24} value={timelineDraft.end} onChange={(e) => setTimelineDraft((prev) => ({ ...prev, end: Number(e.target.value) || 9 }))} />
                          <button className="primary-btn" onClick={addTimelineBlock}>Добавить блок</button>
                        </div>

                        <div className="time-axis mt-5">
                          {Array.from({ length: 9 }).map((_, idx) => (
                            <span key={idx}>{String(8 + idx * 2).padStart(2, "0")}:00</span>
                          ))}
                        </div>
                        <div className="mt-3 grid grid-cols-12 gap-2">
                          {currentTimeline.map((item) => (
                            <div key={item.id} className={`timeline-block ${TIMELINE_STYLE[item.type]}`} style={{ gridColumn: `${Math.max(1, item.start - 7)} / ${Math.min(13, item.end - 7)}` }}>
                              {item.title} {item.start}:00-{item.end}:00
                            </div>
                          ))}
                        </div>
                      </div>

                      {archiveWeeks.length > 0 && <p className="mt-4 text-xs text-slate-500">Архив недель (locked): {archiveWeeks.join(", ")}</p>}
                    </motion.section>
                  )}

                  {tab === "sleep" && (
                    <motion.section key="sleep" className="feature-surface" initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -6 }}>
                      <h2 className="feature-title">Сон и будильник</h2>
                      <p className="feature-text">
                        {nextClassInfo
                          ? `Ближайшее занятие: ${DAYS_FULL[nextClassInfo.dayIndex]} в ${nextClassInfo.start}. Подъем: ${wakeTime}. Рекомендуемый отбой: ${sleepTime}.`
                          : "В расписании нет занятий. Укажи их в разделе Учеба, чтобы расчет сна стал точным."}
                      </p>

                      <div className={`sleep-alert ${shouldSleep ? "late" : "ok"}`}>
                        {shouldSleep
                          ? `Сейчас ${currentTime}. Чтобы встать к ${wakeTime}, лучше уже ложиться.`
                          : `Сейчас ${currentTime}. До сна по графику еще есть время.`}
                      </div>

                      <div className="mt-4 flex flex-wrap gap-2">
                        <button className="primary-btn" onClick={() => addXP(REWARDS.sleepOnTime)}>Лег вовремя (+{REWARDS.sleepOnTime} XP)</button>
                        <select
                          className="field w-[210px]"
                          value={data.study.prepLeadMinutes}
                          onChange={(e) =>
                            setData((prev) => ({
                              ...prev,
                              study: { ...prev.study, prepLeadMinutes: Number(e.target.value) || 120 },
                            }))
                          }
                        >
                          <option value={100}>Запас до занятия: 1ч 40м</option>
                          <option value={110}>Запас до занятия: 1ч 50м</option>
                          <option value={120}>Запас до занятия: 2ч 00м</option>
                          <option value={130}>Запас до занятия: 2ч 10м</option>
                        </select>
                        <input
                          className="field w-[170px]"
                          type="time"
                          value={data.alarm.time}
                          onChange={(e) =>
                            setData((prev) => ({ ...prev, alarm: { ...prev.alarm, time: e.target.value, autoFromSchedule: false, awakeConfirmedAt: null } }))
                          }
                        />
                        <button
                          className={`secondary-btn ${data.alarm.autoFromSchedule ? "active" : ""}`}
                          onClick={() =>
                            setData((prev) => ({
                              ...prev,
                              alarm: {
                                ...prev.alarm,
                                autoFromSchedule: !prev.alarm.autoFromSchedule,
                                time: !prev.alarm.autoFromSchedule && nextClassInfo ? wakeTime : prev.alarm.time,
                                awakeConfirmedAt: null,
                              },
                            }))
                          }
                        >
                          {data.alarm.autoFromSchedule ? "Авто от расписания" : "Ручной будильник"}
                        </button>
                        <button className={`secondary-btn ${data.alarm.enabled ? "active" : ""}`} onClick={() => setData((prev) => ({ ...prev, alarm: { ...prev.alarm, enabled: !prev.alarm.enabled, awakeConfirmedAt: null } }))}>
                          {data.alarm.enabled ? "Будильник включен" : "Будильник выключен"}
                        </button>
                      </div>

                      <p className="mt-3 text-sm text-slate-400">Будильник: <span className="font-bold text-white">{data.alarm.time}</span>. {nextClassInfo ? `Ориентир по расписанию: ${wakeTime}.` : "Добавь занятия, чтобы авторасчет был точнее."}</p>

                      <p className="mt-4 text-sm text-slate-400">Профиль: {identity.telegramUsername || identity.telegramId || "не определен"}. В Telegram WebApp пользователь определяется автоматически.</p>
                      <div className="mt-3 flex flex-wrap gap-2">
                        <button className="secondary-btn" onClick={() => void sendTelegramAlarm("test")}>Тест кнопки будильника в Telegram</button>
                      </div>
                      <p className="mt-2 text-sm text-slate-500">{botStatus || "Подсказка: для теста задайте TELEGRAM_BOT_TOKEN в коде и откройте WebApp внутри Telegram."}</p>

                      {alarmTriggered && (
                        <motion.div className="alarm-overlay mt-4" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                          <p className="font-bold text-lg">Подъем!</p>
                          <p>Если приложение свернуто, надежное оповещение остается через Telegram-бота.</p>
                          <div className="mt-4 flex gap-2">
                            <button className="primary-btn !bg-yellow-600 hover:!bg-yellow-500 !text-white" onClick={() => setData((prev) => ({ ...prev, alarm: { ...prev.alarm, enabled: false, awakeConfirmedAt: new Date().toISOString() } }))}>Проснулся</button>
                            <button className="secondary-btn !bg-black/20 !border-yellow-500/30 hover:!bg-black/40" onClick={() => setData((prev) => ({ ...prev, alarm: { ...prev.alarm, time: addMinutes(prev.alarm.time, 10), awakeConfirmedAt: null } }))}>Отложить на 10 минут</button>
                          </div>
                        </motion.div>
                      )}
                    </motion.section>
                  )}

                  {tab === "xp" && (
                    <motion.section key="xp" className="feature-surface" initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -6 }}>
                      <h2 className="feature-title">Опыт (XP)</h2>
                      <p className="feature-text">XP начисляется за посещение, копилку, сон и закрытие задач.</p>
                      
                      <div className="mt-6 flex gap-4 items-end">
                          <div>
                            <p className="metric-value">{data.xp.points}</p>
                            <p className="metric-label mt-0">доступно XP</p>
                          </div>
                          <div>
                            <p className="text-xl font-bold text-slate-400">{data.xp.spent}</p>
                            <p className="metric-label mt-0 text-slate-500">потрачено за всё время</p>
                          </div>
                      </div>

                      <div className="mt-6 flex flex-wrap gap-2">
                        <button className="primary-btn" onClick={claimDailyFocus}>
                          Закрыл день (+{REWARDS.dailyFocus} XP)
                        </button>
                      </div>

                      <div className="mt-6">
                          <p className="label mb-3">Потратить XP на отдых</p>
                          <div className="flex flex-wrap gap-3">
                            {[
                              [60, "1 час игры"],
                              [90, "Серия сериала"],
                              [140, "Полдня отдыха"],
                            ].map(([cost, title]) => (
                              <button
                                key={title}
                                className="secondary-btn flex flex-col items-start gap-1"
                                onClick={() =>
                                  setData((prev) => {
                                    const value = Number(cost);
                                    if (prev.xp.points < value) return prev;
                                    return { ...prev, xp: { ...prev.xp, points: prev.xp.points - value, spent: prev.xp.spent + value } };
                                  })
                                }
                              >
                                <span>{title}</span>
                                <span className="text-xs text-indigo-300 font-mono">- {cost} XP</span>
                              </button>
                            ))}
                          </div>
                      </div>
                    </motion.section>
                  )}
                </AnimatePresence>
              </main>

              <AnimatePresence>
                {paymentWindow && (
                  <motion.div className="payment-overlay" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    <motion.div className="payment-window" initial={{ y: 16, opacity: 0, scale: 0.98 }} animate={{ y: 0, opacity: 1, scale: 1 }} exit={{ y: 12, opacity: 0, scale: 0.98 }}>
                      <p className="label">СБП перевод (симуляция)</p>
                      <p className="payment-amount">{paymentWindow.amount.toLocaleString("ru-RU")} ₽</p>
                      <p className="text-sm text-slate-400">Переведи по номеру <span className="font-bold text-white">{OZON_PHONE}</span> (OZON Банк).</p>
                      <p className="mt-2 text-sm text-slate-400">Окно подтверждения: <span className="font-mono text-white">{String(paymentMinutes).padStart(2, "0")}:{String(paymentSeconds).padStart(2, "0")}</span></p>
                      <div className="mt-6 flex flex-wrap gap-2">
                        <button className="primary-btn" disabled={paymentMs <= 0} onClick={confirmPayment}>Оплатил</button>
                        <button className="secondary-btn" onClick={() => setPaymentWindow(null)}>Отмена</button>
                      </div>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
